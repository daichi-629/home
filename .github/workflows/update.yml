name: Daily Update

on:
  schedule:
    - cron: '0 0 * * *' # 毎日UTC 00:00に実行
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0 # 全ての履歴を取得（一応）

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Update flake.lock
        run: |
          nix flake update \
            nixpkgs \
            nixpkgs_unstable \
            sops-nix \
            home-manager \
            nix-darwin \
            rust-overlay \
            rustowl-flake \
            nixvim \
            claude-overlay \
            brew-nix \
            brew-api

      - name: Update npm overlays
        run: |
          nix run .#update-npm-overlays
          nix flake update --flake ./overlays/codex
          nix flake update --flake ./overlays/gemini
          nix flake update --flake ./overlays/playwright
          nix flake update \
            codex-overlay \
            gemini-overlay \
            playwright-overlay

      - name: Commit and push changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'chore: daily update of flake.lock and npm overlays'
